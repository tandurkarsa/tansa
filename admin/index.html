<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Tandur Karsa</title>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
    <script>
        // Inisialisasi CMS secara eksplisit
        CMS.init({
            config: {
                backend: {
                    name: 'github',
                    repo: 'tandurkarsa/tandurkarsa.github.io',
                    branch: 'main',
                    base_url: 'https://tandurkarsa.github.io',
                    auth_endpoint: 'auth'
                },
                media_folder: "tansa/aset/img/uploads",
                public_folder: "/tansa/aset/img/uploads",
                collections: [
                    {
                        name: "cerita",
                        label: "Cerita Fiksi Ilmiah",
                        folder: "tansa/_cerita",
                        create: true,
                        slug: "{{slug}}",
                        fields: [
                            { label: "Judul Cerita", name: "title", widget: "string" },
                            { label: "Tanggal Rilis", name: "date", widget: "datetime" },
                            { label: "Ringkasan", name: "description", widget: "text" },
                            { label: "Gambar Sampul", name: "cover", widget: "image", required: false },
                            { label: "Isi Cerita", name: "body", widget: "markdown" }
                        ]
                    },
                    {
                        name: "trailer",
                        label: "Trailer & Video",
                        folder: "tansa/_data/trailers",
                        create: true,
                        extension: "json",
                        fields: [
                            { label: "Judul Video", name: "title", widget: "string" },
                            { label: "ID YouTube", name: "youtube_id", widget: "string" },
                            { label: "Deskripsi Singkat", name: "description", widget: "text" }
                        ]
                    }
                ]
            }
        });
    </script>
</body>
</html>
