<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sambutan · Tandur Karsa</title>
    <link rel="icon" type="image/x-icon" href="favicon-stepe.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0f17;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Space Grotesk', sans-serif;
        }
        .intro-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: auto;
            background: black;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .skip-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }
        .skip-btn:hover {
            background: rgba(250,204,21,0.8);
            color: #0f172a;
        }
        /* Fallback jika video tidak bisa diputar */
        .fallback {
            text-align: center;
            padding: 2rem;
            color: white;
        }
    </style>
</head>
<body>
    <div class="intro-container">
        <video id="introVideo" autoplay muted playsinline>
            <source src="assets/intro.webm" type="video/webm">
            <!-- fallback: jika video gagal, tampilkan teks -->
            Your browser does not support the video tag.
        </video>
        <button class="skip-btn" id="skipBtn">Skip →</button>
    </div>

    <script>
        const video = document.getElementById('introVideo');
        const skipBtn = document.getElementById('skipBtn');

        // Fungsi redirect ke halaman utama
        function goToMain() {
            window.location.href = "home.html";
        }

        // Ketika video selesai, otomatis redirect
        video.addEventListener('ended', goToMain);

        // Skip button
        skipBtn.addEventListener('click', goToMain);

        // Jika video gagal diputar (error), langsung redirect
        video.addEventListener('error', goToMain);

        // Pastikan video mulai (autoplay kadang diblokir mobile)
        video.play().catch(e => {
            console.log("Autoplay diblokir, tampilkan fallback atau redirect?");
            // Bisa langsung redirect atau tampilkan tombol manual
            // Di sini kita tampilkan tombol skip lebih jelas
        });
    </script>
</body>
</html>
