<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANSA Studio | Tandur Karsa</title>
    <style>
        /* Desain Dasar: Tema Premium (Hijau Gelap & Emas) */
        body {
            margin: 0;
            background-color: #0F2E1D; /* Deep Forest Green */
            color: #F5F0E6; /* Putih Gading */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Mengunci scroll saat video main */
        }

        /* Kontainer Video Intro */
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 99;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Biar video memenuhi layar tanpa gepeng */
        }

        /* Konten Utama (Disembunyikan di awal) */
        #main-content {
            display: none;
            padding: 50px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Animasi Transisi Halus */
        .fade-in {
            animation: fadeIn 2s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Desain Tombol Premium */
        .link-btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            background-color: #C6A84B; /* Warm Gold */
            color: #0F2E1D;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .link-btn:hover {
            background-color: #F5F0E6;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div id="intro-container">
        <video id="introVideo" autoplay muted playsinline>
            <source src="tansaintro.webm" type="video/webm">
        </video>
    </div>

    <div id="main-content" class="fade-in">
        <h1>TANSA Studio</h1>
        <p><em>Menanam Gagasan, Menuai Semesta.</em></p>
        <hr style="border-color: #C6A84B; margin: 30px 0;">
        
        <h2>Karya Kami</h2>
        <p>Trailer | Work In Progress (WIP) | Karya Terbaik</p>
        <br>
        
        <a href="LINK_YOUTUBE_KAMU_DI_SINI" class="link-btn" target="_blank">YouTube</a>
        <a href="LINK_INSTAGRAM_KAMU_DI_SINI" class="link-btn" target="_blank">Instagram</a>
    </div>

    <script>
        const video = document.getElementById('introVideo');
        const introContainer = document.getElementById('intro-container');
        const mainContent = document.getElementById('main-content');

        // Logika: Saat video selesai (ended), sembunyikan video dan tampilkan menu
        video.addEventListener('ended', () => {
            introContainer.style.display = 'none'; // Hilangkan video
            mainContent.style.display = 'block';   // Munculkan menu
            document.body.style.overflow = 'auto'; // Buka kunci scroll
        });
    </script>
</body>
</html>
